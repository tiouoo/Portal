name: update/wiki

on:
  schedule:
    - cron: "0 3 */4 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download upstream WikiEntries
        run: |
          curl --fail --location --retry 3 --retry-all-errors \
            --output /tmp/WikiEntries.txt \
            https://raw.githubusercontent.com/Meloong-Git/PCL/main/PCLCS/Resource/WikiEntries.txt

      - name: Update when upstream changed
        run: |
          if cmp --silent /tmp/WikiEntries.txt assets/WikiEntries.txt; then
            echo "WikiEntries.txt is already current."
            exit 0
          fi

          mv /tmp/WikiEntries.txt assets/WikiEntries.txt
          git add assets/WikiEntries.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update wiki-entries"
          git push
