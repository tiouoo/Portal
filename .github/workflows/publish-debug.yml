name: publish/debug

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_json: ${{ steps.meta.outputs.json }}
      app_version: ${{ steps.meta.outputs.app_version }}
      commit: ${{ steps.meta.outputs.commit_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: "recursive"

      - name: Update Submodules
        run: |
          git submodule update --init --recursive
          git submodule foreach --recursive 'git fetch origin main && git checkout -B main origin/main'

      - name: Generate Meta and JSON
        id: meta
        run: |
          BASE_VERSION=$(cat ./src/version.txt | tr -d '[:space:]')
          Y_FULL=$(TZ='Asia/Shanghai' date +'%Y')
          MD=$(TZ='Asia/Shanghai' date +'%m%d')
          HM=$(TZ='Asia/Shanghai' date +'%H%M')
          FULL_TIMESTAMP="${Y_FULL}${MD}${HM}"
          START_EPOCH=$(date -d "2026-01-01 00:00:00" +%s)
          NOW_EPOCH=$(date +%s)
          TOTAL_HOURS=$(( (NOW_EPOCH - START_EPOCH) / 3600 ))
          APP_VERSION="${BASE_VERSION}.${TOTAL_HOURS}"
          COMMIT_HASH=$(git rev-parse --short=6 HEAD)
          BUILD_TIME=$(TZ='Asia/Shanghai' date -Iseconds)
          VERSION_TITLE="build-debug-${APP_VERSION}-${{ github.run_id }}-${COMMIT_HASH}"
          JSON_STRING="{\"type\":\"debug\",\"build-time\":\"${BUILD_TIME}\",\"action\":\"${{ github.run_id }}\",\"commit\":\"${COMMIT_HASH}\",\"version\":\"${BASE_VERSION}\",\"timestamp\":\"${FULL_TIMESTAMP}\",\"version_title\":\"${VERSION_TITLE}\"}"
          echo "json=${JSON_STRING}" >> $GITHUB_OUTPUT
          echo "app_version=${APP_VERSION}" >> $GITHUB_OUTPUT
          echo "commit_hash=${COMMIT_HASH}" >> $GITHUB_OUTPUT

  build:
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Update Submodules
        run: |
          git submodule update --init --recursive
          git submodule foreach --recursive "git fetch origin main && git checkout -B main origin/main"
        shell: bash

      - name: Write CI Config
        run: |
          echo '${{ needs.prepare.outputs.version_json }}' > ./src/version-ci.txt
          echo 'debug' > ./src/package-type.txt
        shell: bash

      - name: Build
        run: dotnet build ./src/Portal.Desktop/Portal.Desktop.csproj -c Debug -r win-x64 /p:Version=${{ needs.prepare.outputs.app_version }}

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path "./src/Portal.Desktop/bin/Debug/net10.0/win-x64/*" -DestinationPath "./Portal.debug.win.x64.zip" -Force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portal-debug-win-x64
          path: ./Portal.debug.win.x64.zip

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./Portal.Release/
          merge-multiple: true

      - name: List Files
        run: ls -la ./Portal.Release/

      - name: Publish Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          title: "build-debug-${{ needs.prepare.outputs.app_version }}-${{ github.run_id }}-${{ needs.prepare.outputs.commit }}"
          automatic_release_tag: "publish-debug"
          prerelease: true
          files: |
            ./Portal.Release/**
